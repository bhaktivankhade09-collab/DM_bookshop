<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Bookshop</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f4f4f4;
    }
    header {
      background-color: #333;
      color: white;
      padding: 15px;
      text-align: center;
    }
    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }
    .book {
      background: white;
      margin: 15px;
      padding: 15px;
      border-radius: 10px;
      width: 220px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      text-align: center;
    }
    .book img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      border-radius: 5px;
    }
    .book h3 {
      margin: 10px 0 5px;
    }
    .book p {
      color: #555;
    }
    footer {
      text-align: center;
      padding: 10px;
      background: #333;
      color: white;
    }
  </style>
</head>
<body>

<header>
  <h1>📚 My Bookshop</h1>
  <p>Your favorite place to buy books</p>
</header>

<div class="container">

  <div class="book">
    <img src="https://images.unsplash.com/photo-1544947950-fa07a98d237f" alt="Book 1">
    <h3>The Great Adventure</h3>
    <p>₹399</p>
  </div>

  <div class="book">
    <img src="https://images.unsplash.com/photo-1512820790803-83ca734da794" alt="Book 2">
    <h3>Learning JavaScript</h3>
    <p>₹499</p>
  </div>

  <div class="book">
    <img src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f" alt="Book 3">
    <h3>Python Basics</h3>
    <p>₹350</p>
  </div>

  <div class="book">
    <img src="https://images.unsplash.com/photo-1519681393784-d120267933ba" alt="Book 4">
    <h3>Design Thinking</h3>
    <p>₹420</p>
  </div>

</div>

<footer>
  <p>© 2026 My Bookshop | All Rights Reserved</p>
</footer>

</body>
</html>
